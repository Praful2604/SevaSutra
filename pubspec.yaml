name: sevasutra_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.4.0
  http: ^1.2.2
  path_provider: ^2.1.4

  # UI
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2

  # Isar Database (FIXED)
  isar: ^3.1.0+1
  isar_flutter_libs:
  intl: ^0.20.2
  connectivity_plus: ^5.0.2
  fl_chart: ^0.68.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # ✅ FIXED COMPATIBLE VERSIONS
  build_runner: ^2.2.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"